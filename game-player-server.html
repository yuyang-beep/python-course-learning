<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇帝的新装 - 游戏（服务器版）</title>
    <style>
        :root {
            --color-gold: #D4AF37;
            --color-white: #FFFFFF;
            --color-bg-light: #F5F5F5;
            --color-text-dark: #333333;
            --color-text-light: #999999;
            --color-border: #D4AF37;
            --color-success: #4CAF50;
            --color-error: #F44336;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            --font-size-h1: 32px;
            --font-size-h2: 20px;
            --font-size-h3: 16px;
            --font-size-body: 16px;
            --font-size-small: 14px;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 15px;
            --spacing-lg: 20px;
            --spacing-xl: 30px;
            --spacing-xxl: 40px;
            --border-radius: 8px;
            --shadow-gold: 0 2px 8px rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-family); background-color: var(--color-white); color: var(--color-text-dark); font-size: var(--font-size-body); }
        .container { max-width: 800px; margin: 0 auto; padding: var(--spacing-xxl); }
        .header { text-align: center; margin-bottom: var(--spacing-xxl); padding-bottom: var(--spacing-xl); border-bottom: 1px solid var(--color-bg-light); }
        .header__title { font-size: var(--font-size-h1); font-weight: 700; margin-bottom: var(--spacing-md); }
        .header__crown { font-size: 36px; margin-right: var(--spacing-sm); }
        .header__subtitle { font-size: var(--font-size-small); color: var(--color-text-light); }

        .card { background-color: var(--color-white); border: 1px solid var(--color-border); border-radius: var(--border-radius); padding: var(--spacing-xl); box-shadow: var(--shadow-gold); }
        .card__title { font-size: var(--font-size-h2); font-weight: 600; color: var(--color-gold); margin-bottom: var(--spacing-xl); padding-bottom: var(--spacing-md); border-bottom: 1px solid var(--color-bg-light); }

        .form-group { margin-bottom: var(--spacing-lg); }
        .form-group__label { display: block; font-size: var(--font-size-small); color: var(--color-text-dark); margin-bottom: var(--spacing-sm); font-weight: 600; }
        .form-group__input { width: 100%; padding: var(--spacing-md); border: 1px solid var(--color-border); border-radius: var(--border-radius); font-size: var(--font-size-body); font-family: var(--font-family); color: var(--color-text-dark); background-color: var(--color-white); }

        .btn { width: 100%; padding: var(--spacing-lg); background-color: var(--color-gold); color: var(--color-white); border: none; border-radius: var(--border-radius); font-size: var(--font-size-body); font-weight: 600; cursor: pointer; transition: all 0.2s ease; margin-top: var(--spacing-md); }
        .btn:hover:not(:disabled) { background-color: #c9a227; }
        .btn:disabled { background-color: var(--color-text-light); cursor: not-allowed; opacity: 0.6; }
        .btn--secondary { background-color: var(--color-text-light); }
        .btn--secondary:hover { background-color: #777777; }

        .info-box { background-color: var(--color-bg-light); padding: var(--spacing-lg); border-radius: var(--border-radius); margin-bottom: var(--spacing-lg); }
        .info-item { display: flex; justify-content: space-between; margin-bottom: var(--spacing-sm); }
        .info-item:last-child { margin-bottom: 0; }
        .info-label { color: var(--color-text-light); font-size: var(--font-size-small); }
        .info-value { font-weight: 600; }

        .waiting-spinner { font-size: 48px; animation: spin 2s linear infinite; margin-bottom: var(--spacing-lg); text-align: center; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .voting-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-lg); margin: var(--spacing-xl) 0; }
        .vote-btn { padding: var(--spacing-xl); border: 2px solid var(--color-border); background-color: var(--color-white); border-radius: var(--border-radius); cursor: pointer; transition: all 0.2s ease; text-align: center; font-family: var(--font-family); }
        .vote-btn:hover { border-color: var(--color-gold); background-color: var(--color-bg-light); }
        .vote-btn.selected { background-color: var(--color-gold); color: var(--color-white); border-color: var(--color-gold); }
        .vote-btn__emoji { font-size: 32px; display: block; margin-bottom: var(--spacing-sm); }
        .vote-btn__text { font-weight: 600; }

        .result-box { background-color: var(--color-bg-light); padding: var(--spacing-xl); border-radius: var(--border-radius); text-align: center; margin: var(--spacing-lg) 0; }
        .result-box__label { font-size: var(--font-size-small); color: var(--color-text-light); margin-bottom: var(--spacing-sm); }
        .result-box__value { font-size: 36px; font-weight: 700; color: var(--color-gold); }
        .result-box__value.positive { color: var(--color-success); }
        .result-box__value.negative { color: var(--color-error); }

        .section { display: none; }
        .section.active { display: block; }

        @media (max-width: 600px) {
            .container { padding: var(--spacing-lg); }
            .header__title { font-size: 24px; }
            .voting-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="header__title"><span class="header__crown">👑</span>皇帝的新装</h1>
            <p class="header__subtitle">游戏客户端（服务器版）</p>
        </div>

        <!-- 连接和加入 -->
        <section id="joinSection" class="section active">
            <div class="card">
                <h2 class="card__title">🎮 加入游戏</h2>
                <!-- 服务器地址 (自动，隐藏) -->
                <input type="hidden" id="serverUrl" value="http://localhost:3000">

                <div class="form-group">
                    <label class="form-group__label">房间代码</label>
                    <input type="text" id="roomCodeInput" class="form-group__input" placeholder="输入房间代码（由管理者提供）" maxlength="6" autofocus>
                </div>
                <div class="form-group">
                    <label class="form-group__label">玩家名称</label>
                    <input type="text" id="playerNameInput" class="form-group__input" placeholder="输入你的名字" maxlength="12">
                </div>
                <button class="btn" id="joinBtn">加入房间</button>
            </div>
        </section>

        <!-- 等待身份分配 -->
        <section id="waitingAssignmentSection" class="section">
            <div class="card">
                <h2 class="card__title">⏳ 等待身份分配</h2>
                <div class="waiting-spinner">⏳</div>
                <div class="info-box">
                    <div class="info-item">
                        <span class="info-label">你的名字</span>
                        <span class="info-value" id="displayName">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">房间代码</span>
                        <span class="info-value" id="displayRoom">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">身份</span>
                        <span class="info-value" id="displayRoleWaiting">未分配</span>
                    </div>
                </div>
                <p style="text-align: center; color: var(--color-text-light); margin-bottom: var(--spacing-lg);">管理者正在分配身份...</p>
                <button class="btn btn--secondary" id="exitWaitingBtn">退出房间</button>
            </div>
        </section>

        <!-- 准备就绪 -->
        <section id="readySection" class="section">
            <div class="card">
                <h2 class="card__title">📋 准备就绪</h2>
                <div class="info-box">
                    <div class="info-item">
                        <span class="info-label">玩家名</span>
                        <span class="info-value" id="displayName2">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">你的身份</span>
                        <span class="info-value" id="displayRole">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">累计分数</span>
                        <span class="info-value" id="displayScore">0</span>
                    </div>
                </div>
                <p style="text-align: center; color: var(--color-text-light); margin-bottom: var(--spacing-lg);">等待管理者开始游戏...</p>
                <button class="btn btn--secondary" id="exitReadyBtn">退出房间</button>
            </div>
        </section>

        <!-- 投票 -->
        <section id="votingSection" class="section">
            <div class="card">
                <h2 class="card__title">🗳️ 第 <span id="roundNum">1</span> 轮投票</h2>
                <div class="info-box">
                    <div class="info-item">
                        <span class="info-label">身份</span>
                        <span class="info-value" id="votingRole">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">累计分数</span>
                        <span class="info-value" id="votingScore">0</span>
                    </div>
                </div>

                <p style="text-align: center; margin: var(--spacing-lg) 0; color: var(--color-text-light);">请选择你的投票</p>

                <div class="voting-grid">
                    <button class="vote-btn" data-vote="质疑">
                        <span class="vote-btn__emoji">💎</span>
                        <span class="vote-btn__text">质疑</span>
                    </button>
                    <button class="vote-btn" data-vote="附和">
                        <span class="vote-btn__emoji">✋</span>
                        <span class="vote-btn__text">附和</span>
                    </button>
                    <button class="vote-btn" data-vote="沉默">
                        <span class="vote-btn__emoji">🤐</span>
                        <span class="vote-btn__text">沉默</span>
                    </button>
                </div>

                <button class="btn" id="submitVoteBtn" disabled>提交投票</button>
            </div>
        </section>

        <!-- 等待结果 -->
        <section id="waitingResultSection" class="section">
            <div class="card">
                <h2 class="card__title">⏳ 等待结果公布</h2>
                <div class="waiting-spinner">🎲</div>
                <div class="info-box">
                    <div class="info-item">
                        <span class="info-label">你的投票</span>
                        <span class="info-value" id="yourVote">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">累计分数</span>
                        <span class="info-value" id="waitScore">0</span>
                    </div>
                </div>
                <p style="text-align: center; color: var(--color-text-light);">等待管理者公布结果...</p>
            </div>
        </section>

        <!-- 显示结果 -->
        <section id="resultSection" class="section">
            <div class="card">
                <h2 class="card__title">📊 第 <span id="resultRound">1</span> 轮结果</h2>

                <div class="info-box">
                    <div class="info-item">
                        <span class="info-label">你的投票</span>
                        <span class="info-value" id="resultVote">-</span>
                    </div>
                </div>

                <div class="result-box">
                    <div class="result-box__label">本轮得分变化</div>
                    <div class="result-box__value" id="roundScoreDisplay">0</div>
                </div>

                <div class="result-box">
                    <div class="result-box__label">累计分数</div>
                    <div class="result-box__value" id="totalScoreDisplay">0</div>
                </div>

                <button class="btn" id="nextRoundBtn">进入下一轮</button>
            </div>
        </section>
    </div>

    <!-- Socket.io 库 -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <script>
        const roleEmojis = { '裁缝': '👔', '大臣': '🧑‍⚖️', '百姓': '👨', '孩子': '🧒' };

        let socket = null;
        let playerData = {
            playerId: null,
            playerName: null,
            playerRole: null,
            roomCode: null,
            totalScore: 0,
            currentRound: 1,
            currentVote: null
        };

        const showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // ==================== 自动设置服务器地址 ====================
        const autoServerUrl = window.location.origin;
        document.getElementById('serverUrl').value = autoServerUrl;

        // ==================== 加入房间 ====================
        document.getElementById('joinBtn').addEventListener('click', () => {
            const serverUrl = document.getElementById('serverUrl').value.trim();
            const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            const playerName = document.getElementById('playerNameInput').value.trim();

            if (!serverUrl || !roomCode || !playerName) {
                alert('请填写所有信息');
                return;
            }

            playerData.playerId = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            playerData.playerName = playerName;
            playerData.roomCode = roomCode;

            if (socket) {
                socket.disconnect();
            }

            socket = io(serverUrl, {
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                reconnectionAttempts: 5
            });

            socket.on('connect', () => {
                console.log('✅ 已连接到服务器');
                socket.emit('join_room', {
                    roomCode,
                    playerId: playerData.playerId,
                    playerName
                });

                document.getElementById('displayName').textContent = playerName;
                document.getElementById('displayRoom').textContent = roomCode;
                document.getElementById('displayName2').textContent = playerName;

                showSection('waitingAssignmentSection');
                setupSocketListeners();
            });

            socket.on('error', (err) => {
                console.error('连接错误:', err);
                alert('连接失败，请检查服务器地址');
            });
        });

        function setupSocketListeners() {
            socket.on('role_assigned', (data) => {
                if (data.playerId === playerData.playerId) {
                    playerData.playerRole = data.role;
                    document.getElementById('displayRoleWaiting').textContent = roleEmojis[data.role] + ' ' + data.role;
                    document.getElementById('displayRole').textContent = roleEmojis[data.role] + ' ' + data.role;
                }
            });

            socket.on('game_started', () => {
                showSection('readySection');
                monitorGameStart();
            });

            socket.on('round_started', (data) => {
                playerData.currentRound = data.round;
                document.getElementById('roundNum').textContent = data.round;
                document.getElementById('resultRound').textContent = data.round;
                resetVoting();
                showSection('votingSection');
                document.getElementById('votingRole').textContent = roleEmojis[playerData.playerRole] + ' ' + playerData.playerRole;
                document.getElementById('votingScore').textContent = playerData.totalScore;
            });

            socket.on('round_ended', (data) => {
                const result = data.results[playerData.playerId];
                if (result) {
                    displayResults(result);
                }
            });

            socket.on('player_left', () => {
                console.log('其他玩家已离开');
            });

            socket.on('disconnect', () => {
                console.log('❌ 与服务器断开连接');
            });
        }

        // ==================== 投票 ====================
        document.querySelectorAll('.vote-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                playerData.currentVote = btn.dataset.vote;
                document.getElementById('submitVoteBtn').disabled = false;
            });
        });

        document.getElementById('submitVoteBtn').addEventListener('click', () => {
            if (!playerData.currentVote || !socket) return;

            socket.emit('submit_vote', {
                roomCode: playerData.roomCode,
                playerId: playerData.playerId,
                round: playerData.currentRound,
                vote: playerData.currentVote
            });

            document.getElementById('yourVote').textContent = playerData.currentVote;
            document.getElementById('waitScore').textContent = playerData.totalScore;
            showSection('waitingResultSection');
        });

        function resetVoting() {
            playerData.currentVote = null;
            document.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('submitVoteBtn').disabled = true;
        }

        function displayResults(result) {
            const scoreDisplay = document.getElementById('roundScoreDisplay');
            scoreDisplay.textContent = (result.score > 0 ? '+' : '') + result.score;
            scoreDisplay.className = 'result-box__value';
            if (result.score > 0) {
                scoreDisplay.classList.add('positive');
            } else if (result.score < 0) {
                scoreDisplay.classList.add('negative');
            }

            playerData.totalScore += result.score;
            document.getElementById('resultVote').textContent = playerData.currentVote;
            document.getElementById('totalScoreDisplay').textContent = playerData.totalScore;
            document.getElementById('displayScore').textContent = playerData.totalScore;

            showSection('resultSection');
        }

        document.getElementById('nextRoundBtn').addEventListener('click', () => {
            if (playerData.currentRound >= 5) {
                alert('游戏已结束！最终分数: ' + playerData.totalScore);
                resetGame();
            } else {
                showSection('readySection');
                resetVoting();
            }
        });

        function monitorGameStart() {
            // 等待轮数开启
        }

        // ==================== 退出 ====================
        const exitButtons = ['exitWaitingBtn', 'exitReadyBtn'];
        exitButtons.forEach(btnId => {
            document.getElementById(btnId).addEventListener('click', resetGame);
        });

        function resetGame() {
            if (socket) {
                socket.emit('exit_room', {
                    roomCode: playerData.roomCode,
                    playerId: playerData.playerId
                });
                socket.disconnect();
            }
            playerData = {
                playerId: null,
                playerName: null,
                playerRole: null,
                roomCode: null,
                totalScore: 0,
                currentRound: 1,
                currentVote: null
            };
            document.getElementById('serverUrl').value = 'http://localhost:3000';
            document.getElementById('roomCodeInput').value = '';
            document.getElementById('playerNameInput').value = '';
            showSection('joinSection');
        }

        console.log('✅ 玩家端已就绪');
    </script>
</body>
</html>
