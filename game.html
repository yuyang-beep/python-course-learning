<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇帝的新装 - 游戏</title>
    <style>
        :root {
            --color-gold: #D4AF37;
            --color-white: #FFFFFF;
            --color-bg-light: #F5F5F5;
            --color-text-dark: #333333;
            --color-text-light: #999999;
            --color-border: #D4AF37;
            --color-success: #4CAF50;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            --spacing-lg: 20px;
            --spacing-xl: 30px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        .container { max-width: 1200px; width: 100%; padding: var(--spacing-xl); }

        .header { text-align: center; margin-bottom: 60px; }
        .header__title { font-size: 48px; font-weight: 700; margin-bottom: 10px; color: var(--color-text-dark); }
        .header__crown { font-size: 56px; margin-right: 10px; }
        .header__subtitle { font-size: 18px; color: var(--color-text-light); }

        .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 900px; margin: 0 auto; }

        .choice-card {
            background: var(--color-white);
            border: 2px solid var(--color-border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
        }

        .choice-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
            border-color: #c9a227;
        }

        .choice-card__icon { font-size: 72px; margin-bottom: 20px; display: block; }
        .choice-card__title { font-size: 28px; font-weight: 700; color: var(--color-text-dark); margin-bottom: 12px; }
        .choice-card__description { font-size: 16px; color: var(--color-text-light); margin-bottom: 30px; line-height: 1.6; }

        .choice-card__button {
            display: inline-block;
            padding: 15px 40px;
            background-color: var(--color-gold);
            color: var(--color-white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .choice-card__button:hover {
            background-color: #c9a227;
        }

        @media (max-width: 768px) {
            .choices { grid-template-columns: 1fr; gap: 20px; }
            .header__title { font-size: 36px; }
            .header__crown { font-size: 42px; }
            .choice-card { padding: 30px; }
            .choice-card__icon { font-size: 56px; }
            .choice-card__title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="header__title"><span class="header__crown">👑</span>皇帝的新装</h1>
            <p class="header__subtitle">多人在线游戏系统</p>
        </div>

        <div class="choices">
            <div class="choice-card">
                <span class="choice-card__icon">🎮</span>
                <h2 class="choice-card__title">管理者</h2>
                <p class="choice-card__description">创建房间，控制游戏流程，管理玩家身份和轮数</p>
                <a href="/admin" class="choice-card__button">进入管理者端</a>
            </div>

            <div class="choice-card">
                <span class="choice-card__icon">🎯</span>
                <h2 class="choice-card__title">玩家</h2>
                <p class="choice-card__description">加入房间，参与投票，体验精彩游戏</p>
                <a href="/player" class="choice-card__button">进入玩家端</a>
            </div>
        </div>
    </div>
</body>
</html>
