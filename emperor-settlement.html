<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇帝的新装 - 结算系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1200px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .round-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .round-btn {
            padding: 12px 8px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #333;
        }

        .round-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .round-btn:hover {
            border-color: #667eea;
        }

        .vote-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .vote-option {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .vote-option:hover {
            border-color: #667eea;
            background: #f5f5f5;
        }

        .vote-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .results {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .results h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .player-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .player-row .label {
            font-weight: 600;
            color: #666;
            font-size: 0.9em;
        }

        .player-row .value {
            color: #333;
            font-size: 1.1em;
        }

        .result-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }

        .result-summary h4 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .ranking {
            margin-top: 30px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: white;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid #667eea;
        }

        .rank-number {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
            width: 50px;
            text-align: center;
            margin-right: 15px;
        }

        .rank-info {
            flex: 1;
        }

        .rank-name {
            font-weight: 600;
            font-size: 1.1em;
            color: #333;
        }

        .rank-role {
            font-size: 0.9em;
            color: #999;
            margin-top: 3px;
        }

        .rank-score {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
            text-align: right;
        }

        .threshold-display {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
        }

        .vote-count {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            text-align: center;
            color: #333;
        }

        .adjustment-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .info-box {
            background: #f0f5ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .info-box strong {
            color: #667eea;
        }

        .child-section {
            background: #fff8f0;
            padding: 15px;
            border-radius: 6px;
            border: 2px solid #ffb366;
            margin-bottom: 15px;
        }

        .child-section label {
            color: #ff8c00;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .reset-btn {
            background: #999;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 皇帝的新装</h1>
            <p>Vibe-Coding 结算系统 v1.0</p>
        </div>

        <div class="content-wrapper">
            <!-- 左侧：游戏设置和投票输入 -->
            <div class="card">
                <h2>⚙️ 游戏设置</h2>

                <div class="info-box">
                    <strong>游戏规则：</strong>
                    <ul style="margin-left: 20px; margin-top: 8px;">
                        <li>5轮游戏，每轮对应一个阈值：[2, 3, 4, 5, 6]</li>
                        <li>质疑票数 ≥ 有效阈值为成功</li>
                        <li>孩子有1次特殊质疑（双倍效果）</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label>选择要结算的轮数：</label>
                    <div class="round-selector">
                        <button class="round-btn active" onclick="selectRound(1)">第1轮</button>
                        <button class="round-btn" onclick="selectRound(2)">第2轮</button>
                        <button class="round-btn" onclick="selectRound(3)">第3轮</button>
                        <button class="round-btn" onclick="selectRound(4)">第4轮</button>
                        <button class="round-btn" onclick="selectRound(5)">第5轮</button>
                    </div>
                </div>

                <h3 style="color: #667eea; margin-top: 25px; margin-bottom: 15px;">第 <span id="currentRound">1</span> 轮设置</h3>

                <div class="form-group">
                    <label>裁缝设定的基础阈值：</label>
                    <select id="baseThreshold">
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                </div>

                <div class="adjustment-inputs">
                    <div class="form-group">
                        <label>大臣1 调整：</label>
                        <select id="minister1Adjust">
                            <option value="-1">-1</option>
                            <option value="0" selected>0</option>
                            <option value="1">+1</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>大臣2 调整：</label>
                        <select id="minister2Adjust">
                            <option value="-1">-1</option>
                            <option value="0" selected>0</option>
                            <option value="1">+1</option>
                        </select>
                    </div>
                </div>

                <div class="threshold-display" id="effectiveThreshold">
                    有效阈值：3
                </div>

                <h3 style="color: #667eea; margin-top: 25px; margin-bottom: 15px;">投票统计</h3>

                <div class="form-group">
                    <label>质疑票数：</label>
                    <input type="number" id="challengeVotes" value="0" min="0" max="9">
                </div>

                <div class="child-section">
                    <label style="color: #ff8c00; font-weight: 600;">🧒 孩子的特殊质疑</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="childSpecial" onchange="updateThreshold()">
                        <label for="childSpecial" style="margin: 0; color: #333;">本轮使用特殊质疑</label>
                    </div>
                    <p style="font-size: 0.9em; color: #666; margin-top: 8px;">
                        ✓ 特殊质疑成功：自己得2分，选择附和者扣2分<br>
                        ✓ 特殊质疑失败：无额外效果
                    </p>
                </div>

                <button onclick="calculateRound()">💾 结算本轮</button>
                <button class="reset-btn" onclick="resetForm()">🔄 重置表单</button>
            </div>

            <!-- 右侧：结果显示 -->
            <div class="card">
                <h2>📊 结算结果</h2>

                <div id="roundResults" class="results" style="display: none;">
                    <h3>第 <span id="resultRound">1</span> 轮结果</h3>

                    <div class="result-summary">
                        <h4 id="resultStatus">质疑成功！</h4>
                        <p>有效阈值：<span id="thresholdValue">3</span> | 质疑票数：<span id="voteValue">0</span></p>
                    </div>

                    <h3 style="margin-top: 20px; color: #667eea; font-size: 1.1em;">得分者</h3>
                    <div id="winners" class="player-row" style="border-left-color: #4caf50;"></div>

                    <h3 style="margin-top: 20px; color: #667eea; font-size: 1.1em;">扣分者</h3>
                    <div id="losers" class="player-row" style="border-left-color: #f44336;"></div>
                </div>

                <div style="margin-top: 30px;">
                    <h2>🏆 实时排名</h2>
                    <div class="ranking" id="ranking">
                        <div style="text-align: center; color: #999; padding: 20px;">
                            开始结算后显示排名
                        </div>
                    </div>
                </div>

                <button onclick="exportResults()" style="margin-top: 20px; background: #4caf50;">📥 导出结果</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏数据结构
        const gameData = {
            players: [
                { name: '裁缝1', role: '裁缝', score: 0 },
                { name: '裁缝2', role: '裁缝', score: 0 },
                { name: '大臣1', role: '大臣', score: 0 },
                { name: '大臣2', role: '大臣', score: 0 },
                { name: '百姓1', role: '百姓', score: 0 },
                { name: '百姓2', role: '百姓', score: 0 },
                { name: '百姓3', role: '百姓', score: 0 },
                { name: '孩子', role: '孩子', score: 0 }
            ],
            rounds: {}
        };

        let currentRound = 1;

        function selectRound(round) {
            currentRound = round;
            document.querySelectorAll('.round-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('currentRound').textContent = round;
            document.getElementById('resultRound').textContent = round;
            updateThreshold();
        }

        function updateThreshold() {
            const base = parseInt(document.getElementById('baseThreshold').value);
            const m1 = parseInt(document.getElementById('minister1Adjust').value);
            const m2 = parseInt(document.getElementById('minister2Adjust').value);
            const effective = base + m1 + m2;
            document.getElementById('effectiveThreshold').textContent = `有效阈值：${effective}`;
        }

        function calculateRound() {
            const base = parseInt(document.getElementById('baseThreshold').value);
            const m1 = parseInt(document.getElementById('minister1Adjust').value);
            const m2 = parseInt(document.getElementById('minister2Adjust').value);
            const effective = base + m1 + m2;
            const challengeVotes = parseInt(document.getElementById('challengeVotes').value);
            const childSpecial = document.getElementById('childSpecial').checked;

            const success = challengeVotes >= effective;

            // 更新结果显示
            document.getElementById('roundResults').style.display = 'block';
            document.getElementById('thresholdValue').textContent = effective;
            document.getElementById('voteValue').textContent = challengeVotes;

            if (success) {
                document.getElementById('resultStatus').innerHTML = '✅ <span style="color: #4caf50;">质疑成功！</span>';
                document.getElementById('winners').innerHTML = `
                    <div class="label">得分玩家</div>
                    <div class="value">+1分</div>
                    <div class="value">${childSpecial ? '孩子 +2分' : ''}</div>
                `;
                document.getElementById('losers').innerHTML = `
                    <div class="label">扣分玩家</div>
                    <div class="value">-1分</div>
                    <div class="value">${childSpecial ? '附和者 -2分' : ''}</div>
                `;
            } else {
                document.getElementById('resultStatus').innerHTML = '❌ <span style="color: #f44336;">质疑失败！</span>';
                document.getElementById('winners').innerHTML = `
                    <div class="label">得分玩家</div>
                    <div class="value">+1分</div>
                    <div class="value">（选择附和或沉默）</div>
                `;
                document.getElementById('losers').innerHTML = `
                    <div class="label">扣分玩家</div>
                    <div class="value">-1分</div>
                    <div class="value">（选择质疑）</div>
                `;
            }

            // 保存轮数数据
            gameData.rounds[currentRound] = {
                base, m1, m2, effective, challengeVotes, childSpecial, success
            };

            updateRanking();
        }

        function updateRanking() {
            const sorted = [...gameData.players].sort((a, b) => b.score - a.score);
            let html = '';
            sorted.forEach((player, index) => {
                const medal = ['🥇', '🥈', '🥉', '📍'][index] || '•';
                html += `
                    <div class="rank-item">
                        <div class="rank-number">${medal}</div>
                        <div class="rank-info">
                            <div class="rank-name">${player.name}</div>
                            <div class="rank-role">${player.role}</div>
                        </div>
                        <div class="rank-score">${player.score}</div>
                    </div>
                `;
            });
            document.getElementById('ranking').innerHTML = html;
        }

        function resetForm() {
            document.getElementById('baseThreshold').value = '3';
            document.getElementById('minister1Adjust').value = '0';
            document.getElementById('minister2Adjust').value = '0';
            document.getElementById('challengeVotes').value = '0';
            document.getElementById('childSpecial').checked = false;
            document.getElementById('roundResults').style.display = 'none';
            updateThreshold();
        }

        function exportResults() {
            const data = JSON.stringify(gameData, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `emperor-results-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // 初始化
        updateThreshold();
    </script>
</body>
</html>
